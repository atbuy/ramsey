<div class="flex items-center flex-wrap gap-y-1 mt-3">
  {% for star in range(1, 11) %}
  <button
    {% if star == movie.rating %}
    hx-delete="/movies/{{ movie.id }}/rating" title="Clear rating"
    {% else %}
    hx-put="/movies/{{ movie.id }}/rating/{{ star }}" title="Rate {{ star }}/10"
    {% endif %}
    hx-target="{{ star_target | default('#library') }}" hx-swap="{{ star_swap | default('outerHTML') }}"
    class="pr-0.5 {% if movie.rating and star <= movie.rating %}text-star-on{% else %}text-star-off{% endif %} hover:text-star-on transition">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 576 512" width="15px" height="15px" fill="currentColor">
      <path
        d="M316.9 18C311.6 7 300.4 0 288.1 0s-23.4 7-28.8 18L195 150.3 51.4 171.5c-12 1.8-22 10.2-25.7 21.7s-.7 24.2 7.9 32.7L137.8 327 113.2 470.9c-2 12 3 24.2 12.9 31.3s23 8 33.8 2.3l128.3-68.5 128.3 68.5c10.8 5.7 23.9 4.9 33.8-2.3s14.9-19.3 12.9-31.3L438.5 327 542.7 225.9c8.6-8.5 11.7-21.2 7.9-32.7s-13.7-19.9-25.7-21.7L381.2 150.3 316.9 18z" />
    </svg>
  </button>
  {% endfor %}
  {% if movie.rating %}
  <span class="ml-2 text-muted text-sm">{{ movie.rating }}/10</span>
  {% endif %}
</div>
