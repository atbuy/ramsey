<div id="watched-list" class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-5">
  {% for movie in watched %}
    {% include "./components/movie.html" %}
  {% endfor %}
  {% if not watched %}
  <div class="col-span-full text-center text-muted py-20">
    Nothing on the marquee yet &mdash; search above to log your first movie.
  </div>
  {% endif %}
</div>
