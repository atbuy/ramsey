<div data-title="{{ movie.title | lower }}" style="view-transition-name: movie-{{ movie.id }}"
  class="flex flex-col rounded-lg overflow-hidden bg-surface border border-accent/20 shadow-lg shadow-black/40 hover:border-accent/50 transition">
  <div class="relative cursor-pointer" hx-get="/movies/{{ movie.id }}" hx-target="#modal">
    <img src="{{ poster_src(movie) }}" alt="{{ movie.title }} poster" loading="lazy" decoding="async"
      class="w-full aspect-[2/3] object-cover" />
    {% set label = kind(movie.type) %}
    {% if label %}
    <span class="absolute top-2 left-2 rounded-full bg-black/70 border border-accent/60 text-white text-xs px-2 py-1">
      {{ label }}
    </span>
    {% endif %}
  </div>

  <div class="flex flex-col flex-1 p-4">
    <span class="font-display text-lg text-ink leading-snug cursor-pointer hover:text-accent transition"
      hx-get="/movies/{{ movie.id }}" hx-target="#modal">{{ movie.title }}{% if movie.notes %}
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 448 512" class="inline w-3 h-3 ml-1 text-accent/70"
        fill="currentColor">
        <title>Has notes</title>
        <path
          d="M0 216C0 149.7 53.7 96 120 96l8 0c17.7 0 32 14.3 32 32s-14.3 32-32 32l-8 0c-30.9 0-56 25.1-56 56l0 8 64 0c35.3 0 64 28.7 64 64l0 64c0 35.3-28.7 64-64 64l-64 0c-35.3 0-64-28.7-64-64l0-32 0-32 0-72zm256 0c0-66.3 53.7-120 120-120l8 0c17.7 0 32 14.3 32 32s-14.3 32-32 32l-8 0c-30.9 0-56 25.1-56 56l0 8 64 0c35.3 0 64 28.7 64 64l0 64c0 35.3-28.7 64-64 64l-64 0c-35.3 0-64-28.7-64-64l0-32 0-32 0-72z" />
      </svg>{% endif %}</span>
    <span class="text-muted text-sm truncate">
      {% if movie.year %}{{ movie.year }} &middot; {% endif %}{{ movie.people }}
    </span>
    <span class="text-muted/70 text-xs mt-2">Added: {{ movie.added }}</span>

    <div class="flex items-center justify-between mt-auto pt-3 border-t border-accent/10">
      <button hx-post="/movies/{{ movie.id }}/watch" hx-target="#library" hx-swap="outerHTML"
        title="Log your first watch"
        class="border border-accent/40 text-accent rounded-full px-3 py-1 hover:bg-accent/20 transition text-sm">
        &check; Watched it
      </button>
      <button hx-delete="/movies/{{ movie.id }}" hx-confirm="Remove {{ movie.title }} from your watchlist?"
        hx-target="#library" hx-swap="outerHTML" title="Remove from watchlist"
        class="text-danger/60 hover:text-danger transition p-1">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 448 512" width="14px" height="14px" fill="currentColor">
          <path
            d="M135.2 17.7L128 32 32 32C14.3 32 0 46.3 0 64S14.3 96 32 96l384 0c17.7 0 32-14.3 32-32s-14.3-32-32-32l-96 0-7.2-14.3C307.4 6.8 296.3 0 284.2 0L163.8 0c-12.1 0-23.2 6.8-28.6 17.7zM416 128L32 128 53.2 467c1.4 21.3 19.1 37 40.4 37l260.8 0c21.3 0 39-15.7 40.4-37L416 128z" />
        </svg>
      </button>
    </div>
  </div>
</div>
